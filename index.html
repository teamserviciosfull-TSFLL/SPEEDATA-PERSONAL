<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Servicios Full · Speedata</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00D1FF; --bg: #0b101a; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html {
            height: 100%; width: 100%; overflow: hidden;
            background: var(--bg); color: var(--primary);
            font-family: 'Orbitron', sans-serif;
            display: flex; align-items: center; justify-content: center;
        }
        .loader { text-align: center; cursor: pointer; }
        .fa-satellite-dish {
            font-size: 72px;
            filter: drop-shadow(0 0 18px var(--primary));
            animation: pulse 1.8s ease-in-out infinite;
        }
        p { margin-top: 22px; font-size: 13px; letter-spacing: 6px; text-transform: uppercase; }
        .bar-wrap {
            width: 180px; height: 3px; background: rgba(0,209,255,.1);
            border-radius: 99px; margin: 18px auto 0; overflow: hidden;
        }
        .bar-fill {
            height: 100%; background: var(--primary); width: 0%;
            animation: load 2s linear forwards;
        }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        @keyframes load { to { width: 100%; } }
        
        #btn-manual {
            margin-top: 20px;
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 10px 20px;
            font-family: 'Orbitron';
            cursor: pointer;
            display: none; /* Se muestra solo si falla la auto-carga */
        }
    </style>
</head>
<body>

    <div class="loader" onclick="irAApp()">
        <i class="fa-solid fa-satellite-dish"></i>
        <p id="status">Iniciando Speedata</p>
        <div class="bar-wrap"><div class="bar-fill"></div></div>
        <button id="btn-manual">ENTRAR MANUALMENTE</button>
    </div>

    <script>
        const FINAL_URL = "https://script.google.com/macros/s/AKfycbzMMmMV3PfhAAP2xYnioatBlmwdf-8qZDhTANMwwwf6IhjqZQJmOMYt6MoEcXgKFjDLKA/exec";

        function irAApp() {
            window.location.href = FINAL_URL;
        }

        // Intento de redirección automática
        setTimeout(() => {
            document.getElementById('status').innerText = "Abriendo...";
            window.open(FINAL_URL, "_self");
        }, 2200);

        // Si después de 5 segundos sigue aquí, mostrar botón manual
        setTimeout(() => {
            document.getElementById('btn-manual').style.display = "inline-block";
            document.getElementById('status').innerText = "Click para entrar";
        }, 5000);
    </script>
</body>
</html>
